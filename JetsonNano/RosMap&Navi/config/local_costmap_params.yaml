local_costmap:
  global_frame: odom     # IMPORTANT: Operates in the ODOM frame (moves with robot's estimated position)
  robot_base_frame: base_link
  update_frequency: 5.0  # Update more often for reaction (Hz) - Balance CPU vs responsiveness
  publish_frequency: 2.0 # Publish more often for RViz (Hz)
  static_map: false      # Does NOT use the static map directly
  rolling_window: true   # Map window moves with the robot
  width: 4.0             # Size of the moving window (meters)
  height: 4.0            # Size of the moving window (meters)
  resolution: 0.05       # Grid resolution (meters/cell) - Match GMapping if possible
  transform_tolerance: 0.5 # Allow 0.5 sec delay for TF


  # No static_layer here for local costmap

  obstacle_layer:
    enabled: true
    obstacle_range: 3.0
    raytrace_range: 3.5
    observation_sources: laser_scan_sensor
    laser_scan_sensor: {sensor_frame: laser_frame, data_type: LaserScan, topic: /scan, marking: true, clearing: true}
    # track_unknown_space: true # If you want this

  inflation_layer:
    enabled: true
    cost_scaling_factor: 5.0
    inflation_radius: 0.30